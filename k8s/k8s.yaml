---
apiVersion: v1
kind: Service
metadata:
  name: obs-bingo
  namespace: obs-bingo
  labels:
    app: obs-bingo
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: obs-bingo
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-bingo
  namespace: obs-bingo
  labels:
    app: obs-bingo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obs-bingo
  template:
    metadata:
      labels:
        app: obs-bingo
    spec:
      containers:
      - name: obs-bingo
        image: ghcr.io/dilaz/obs-bingo:81a063c2566bdfc53b27c9d8e8611fdbde2ab67b
        imagePullPolicy: IfNotPresent
      imagePullSecrets:
      - name: github-container-registry
