name: Build & Update Image

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "0 12 * * 0"

env:
  IMAGE: ghcr.io/dilaz/obs-bingo

jobs:
  build:
    name: Build and update image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE }}:${{ github.sha }}|" k8s/k8s.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/k8s.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image to ${{ github.sha }} [skip ci]"
          git push
